<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Летающий в пустоте</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 18px; z-index: 10; }
        #score { background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 12px; display: inline-block; }
        #chat { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 400px; background: rgba(0,0,0,0.7); border-radius: 16px; padding: 10px; z-index: 10; }
        #chatMessages { height: 100px; overflow-y: auto; color: white; font-size: 14px; margin-bottom: 6px; }
        #chatInput { width: 100%; padding: 8px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; }
        #chatInput::placeholder { color: #888; }
        #controls { position: absolute; bottom: 120px; right: 30px; color: white; background: rgba(0,0,0,0.5); padding: 12px 20px; border-radius: 12px; font-size: 14px; z-index: 10; }
        #playersList { position: absolute; top: 20px; right: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px 16px; border-radius: 12px; font-size: 13px; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">🪙 0</div>
    </div>
    <div id="playersList">Игроки: 1</div>
    <div id="controls">WASD — движение · Shift — ускорение · C — камера</div>
    <div id="chat">
        <div id="chatMessages"></div>
        <input id="chatInput" placeholder="Введите сообщение..." />
    </div>
    
    <!-- СПИСОК ИГРОКОВ (ПРАВЫЙ ВЕРХНИЙ УГОЛ) -->
    <div id="playersWindow" style="position: absolute; top: 80px; right: 20px; color: white; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); padding: 12px 18px; border-radius: 16px; font-size: 13px; z-index: 10; min-width: 140px; border: 1px solid rgba(255,255,255,0.05);">
        <div style="font-weight: 700; margin-bottom: 8px; color: rgba(255,255,255,0.5); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;">👥 Игроки</div>
        <div id="playersListFull"></div>
    </div>

    <!-- ТАБЛИЦА ЛИДЕРОВ (ЛЕВЫЙ ВЕРХНИЙ УГОЛ) -->
    <div id="leaderboard" style="position: absolute; top: 120px; left: 20px; color: white; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); padding: 12px 18px; border-radius: 16px; font-size: 13px; z-index: 10; min-width: 130px; border: 1px solid rgba(255,255,255,0.05);">
        <div style="font-weight: 700; margin-bottom: 8px; color: rgba(255,255,255,0.5); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;">🏆 Лидеры</div>
        <div id="leaderboardContent"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
